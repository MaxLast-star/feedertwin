name: Deploy site to GitHub Pages

# Сборка Docusaurus-сайта и публикация на GitHub Pages.
# Дашборд (dashboard/index.html) вкладывается в статику сайта перед сборкой.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем один одновременный деплой, не отменяя уже идущий.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Embed what-if dashboard
        run: |
          mkdir -p website/static/dashboard
          cp dashboard/index.html website/static/dashboard/index.html

      - name: Build site
        working-directory: website
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
